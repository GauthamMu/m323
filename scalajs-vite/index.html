<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scala.js + Vite</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #1a1a2e;
        color: #eee;
      }
      #app,
      #app2 {
        text-align: center;
      }
      button {
        margin-top: 1rem;
        padding: 0.5rem 1.5rem;
        font-size: 1rem;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #e94560;
        color: white;
      }
      button:hover {
        background: #c73652;
      }
      input[type="checkbox"] {
        width: 15px;
        height: 15px;
        border: 1px solid black;
        appearance: none; /* removes default checkbox */
        cursor: pointer;
        background-color: white;
      }

      input[type="checkbox"]:checked {
        background-color: black; /* solid fill */
      }
      td {
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="app2"></div>
    <style id="style"></style>
    <script src="/target/scala-3.4.2/scalajs-vite-fastopt/main.js"></script>
  </body>
</html>
